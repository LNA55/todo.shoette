<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Mon planning — Ethan</title>
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;}
  body{font-family:"Varela Round",ui-rounded,"SF Pro Rounded",system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
    color:#20222b;background:linear-gradient(160deg,#fef6ff 0%,#eef4ff 55%,#eafff3 100%);
    min-height:100vh;padding:clamp(18px,5vw,44px);}
  header{max-width:760px;margin:0 auto clamp(18px,4vh,32px);text-align:center;}
  header h1{font-size:clamp(2rem,7vw,3.2rem);font-weight:800;margin:.1em 0;
    background:linear-gradient(90deg,#ff5d8f,#ffb03a,#4fd1ff);-webkit-background-clip:text;background-clip:text;color:transparent;}
  header p{color:#5a6070;font-size:clamp(.95rem,2.8vw,1.15rem);margin:6px 0 0;font-weight:600;}
  #months{max-width:760px;margin:0 auto;display:flex;flex-direction:column;gap:clamp(22px,4vh,38px);}
  .month h2{font-size:clamp(1.3rem,5vw,2rem);font-weight:800;text-align:center;margin:0 0 12px;color:#3a4050;}
  .wd{display:grid;grid-template-columns:repeat(7,1fr);gap:clamp(5px,1.4vw,10px);margin-bottom:6px;}
  .wd span{text-align:center;font-weight:800;color:#a2a7b3;font-size:clamp(.75rem,2.4vw,1rem);}
  .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:clamp(5px,1.4vw,10px);}
  .cell{aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;
    font-size:clamp(1rem,4vw,1.5rem);font-weight:800;border-radius:16px;text-decoration:none;color:#20222b;
    background:#fff;box-shadow:0 4px 12px rgba(30,30,60,.08),0 0 0 1px rgba(0,0,0,.03);
    transition:transform .12s ease,box-shadow .12s ease;}
  .cell:hover{transform:translateY(-2px) scale(1.05);box-shadow:0 10px 20px rgba(30,30,60,.16);}
  .cell.we{background:#fff4f9;color:#c2508a;}
  .cell.today{background:linear-gradient(135deg,#ffd36e,#ff9f5a);color:#fff;box-shadow:0 6px 16px rgba(255,150,60,.4);}
  .cell.empty{background:transparent;box-shadow:none;pointer-events:none;}
  footer{max-width:760px;margin:clamp(24px,5vh,44px) auto 8px;text-align:center;}
  footer a{color:#7a5bff;text-decoration:none;font-weight:700;}
</style>
</head>
<body>
<a href="/ethan/" style="position:fixed;top:14px;left:16px;z-index:50;color:#5b4bd6;text-decoration:none;font-weight:700;background:rgba(255,255,255,.9);padding:7px 14px;border-radius:999px;box-shadow:0 2px 10px rgba(0,0,0,.14);font-family:'Varela Round',system-ui,-apple-system,'Segoe UI',Roboto,Arial,sans-serif;">🏠 Ethan</a>
  <header>
    <h1>Mon planning</h1>
    <p>Juillet &amp; Août 2026 — clique sur un jour</p>
  </header>
  <div id="months"></div>
  <footer><a href="/ethan/">← Retour</a></footer>

<script>
  var WD=['L','M','M','J','V','S','D'];
  function pad(n){return n<10?'0'+n:''+n;}
  function todayStr(){var t=new Date();return t.getFullYear()+'-'+pad(t.getMonth()+1)+'-'+pad(t.getDate());}
  function monthBlock(year,month,label){
    var first=new Date(year,month,1);
    var dim=new Date(year,month+1,0).getDate();
    var off=(first.getDay()+6)%7;
    var cells='';
    for(var i=0;i<off;i++) cells+='<span class="cell empty"></span>';
    for(var d=1;d<=dim;d++){
      var ds=year+'-'+pad(month+1)+'-'+pad(d);
      var dow=(off+d-1)%7;
      var cls='cell'+(dow>=5?' we':'')+(ds===todayStr()?' today':'');
      cells+='<a class="'+cls+'" href="jour/?d='+ds+'">'+d+'</a>';
    }
    return '<section class="month"><h2>'+label+' '+year+'</h2>'+
      '<div class="wd">'+WD.map(function(w){return '<span>'+w+'</span>';}).join('')+'</div>'+
      '<div class="grid">'+cells+'</div></section>';
  }
  document.getElementById('months').innerHTML=monthBlock(2026,6,'Juillet')+monthBlock(2026,7,'Août');
</script>
</body>
</html>
